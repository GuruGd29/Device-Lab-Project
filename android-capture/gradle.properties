# JVM args for the Gradle daemon. 2g is comfortable for an AGP 8.5 build.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# AndroidX is required (Compose, WorkManager, lifecycle all ship as AndroidX).
android.useAndroidX=true

# Kotlin code style for the IDE.
kotlin.code.style=official

# Build the per-module BuildConfig classes (we use buildConfigField for SFU url / camera id).
android.defaults.buildfeatures.buildconfig=true

# Non-transitive R classes keep resource references namespaced to :app.
android.nonTransitiveRClass=true
